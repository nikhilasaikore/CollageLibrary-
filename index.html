<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Pro | Permanent Storage</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="library list.css">
</head>
<body>

    <div id="login-view" class="view-container active-view">
        <div class="login-split">
            <div class="login-banner">
                <div class="banner-text">
                    <h1>Welcome to Library</h1>
                    <p>Your data is now saved automatically.</p>
                </div>
            </div>
            <div class="login-form-container">
                <form id="loginForm" class="login-form">
                    <h2>Admin Login</h2>
                    <div class="input-group">
                        <label>Username</label>
                        <input type="text" id="username" placeholder="admin" required>
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="admin123" required>
                    </div>
                    <button type="submit" class="btn-primary">Sign In</button>
                </form>
            </div>
        </div>
    </div>

    <div id="app-view" class="view-container">
        <aside class="sidebar">
            <div class="logo"><h2>LibroPro</h2></div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-link active" data-target="page-home">Home</a>
                <a href="#" class="nav-link" data-target="page-catalog">Catalog</a>
                <a href="#" class="nav-link" data-target="page-bookings">Tracker History</a>
            </nav>
            <button id="logoutBtn" class="btn-logout">Logout</button>
        </aside>

        <main class="main-content">
            <section id="page-home" class="app-page active-page">
                <h1>Featured Books</h1>
                <div class="book-grid" id="homeBookGrid"></div>
            </section>

            <section id="page-catalog" class="app-page">
                <h1>Full Catalog</h1>
                <div class="book-grid" id="catalogBookGrid"></div>
            </section>

            <section id="page-bookings" class="app-page">
                <h1>Permanent Checkout Tracker</h1>
                <div class="tracker-card">
                    <table class="tracker-table">
                        <thead>
                            <tr>
                                <th>Student Name</th>
                                <th>Student ID</th>
                                <th>Book Title</th>
                                <th>Date & Time</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        
                        <tbody id="myBookingsGrid"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div id="student-modal" class="modal">
        <div class="modal-content">
            <h3>Checkout Details</h3>
            <p id="modal-book-title"></p>
            <div class="input-group">
                <label>Student Name</label>
                <input type="text" id="studentName">
            </div>
            <div class="input-group">
                <label>Student ID</label>
                <input type="text" id="studentID">
            </div>
            <div class="modal-actions">
                <button class="btn-outline" onclick="closeModal()">Cancel</button>
                <button class="btn-primary" id="confirmCheckout">Save ganesh  Entry</button>
            </div>
        </div>
    </div>

    <script src="library list.js"></script>
</body>
</html>
